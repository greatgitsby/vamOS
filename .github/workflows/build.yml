name: build

concurrency:
  group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}-build-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: get kernel submodule ref
        id: kernel-submodule
        run: echo "ref=$(git ls-tree HEAD | awk '$4 == "kernel"' | awk '{print $3}')" | tee -a $GITHUB_OUTPUT

      - name: restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kernel-${{ steps.kernel-submodule.outputs.ref }}-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-${{ steps.kernel-submodule.outputs.ref }}-
            ccache-kernel-

      - name: build kernel
        run: ./vamos build kernel

      - name: upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: build/boot.img
          if-no-files-found: error

  build-system:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: build system image
        run: ./vamos build system

      - name: upload system.erofs.img
        uses: actions/upload-artifact@v4
        with:
          name: system.erofs.img
          path: build/system.erofs.img
          if-no-files-found: error

      - name: upload rootfs profile
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-profile
          path: |
            build/rootfs-profile.json
            build/rootfs-profile.md
          if-no-files-found: error

      - name: download master baseline
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p baseline
          RUN_ID=$(gh run list --workflow=build.yml --branch=master \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name rootfs-profile --dir baseline/ || true
          fi

      - name: post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate diff (gracefully handles missing baseline)
          DIFF_MD=$(./vamos profile diff baseline/rootfs-profile.json build/rootfs-profile.json 2>/dev/null || echo "No baseline available")
          PROFILE_MD=$(cat build/rootfs-profile.md)

          # Assemble comment with hidden marker for find-and-update
          printf -v COMMENT_BODY '%s\n%s\n\n%s\n%s\n\n---\n\n%s' \
            '<!-- rootfs-profile-bot -->' \
            '## vamOS System Profile' \
            '### Changes vs master' \
            "$DIFF_MD" \
            "$PROFILE_MD"

          # Find existing comment by marker
          COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- rootfs-profile-bot -->")) | .id' \
            | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH -f body="$COMMENT_BODY"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT_BODY"
          fi

  release:
    if: github.event_name == 'push'
    needs: [build-kernel, build-system]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: download boot.img
        uses: actions/download-artifact@v4
        with:
          name: boot.img
          path: build/

      - name: download system.erofs.img
        uses: actions/download-artifact@v4
        with:
          name: system.erofs.img
          path: build/

      - name: generate manifest
        env:
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}
        run: |
          VERSION=$(cat userspace/root/VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          RELEASE_URL=$RELEASE_URL python3 tools/build/package_ota.py

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"

          # Delete existing release if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create release with all images and manifest
          gh release create "$TAG" \
            --title "vamOS $TAG" \
            --target "${{ github.sha }}" \
            --notes "Automated release from commit ${{ github.sha }}" \
            build/ota/*.img \
            build/ota/manifest.json
